name: house_price_prediction

on: [push]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # THIS IS THE MISSING PIECE IN YOUR PIPELINE
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: iterative/setup-cml@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify pandas install
        run: |
          python -c "import pandas; print('pandas installed OK')"

      - name: Train model
        run: |
          python train.py

      - name: Write CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Model Results" > report.md
          cat report.txt >> report.md
          echo "## Feature Importance" >> report.md
          echo "![](feature_importance.png)" >> report.md
          cml comment create report.md
